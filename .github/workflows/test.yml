name: Tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: astral-sh/setup-uv@v4
      - run: brew install tmux
      - run: uv sync
      - run: uv run pytest tests/unit/ -v
