name: Tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  unit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run pytest tests/unit/ -v

  integration-core:
    runs-on: macos-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: astral-sh/setup-uv@v4
      - run: brew install zellij ergochat/tap/ergo weechat
      - run: uv sync
      - run: uv run pytest tests/integration/ -v

  e2e-core:
    runs-on: macos-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: astral-sh/setup-uv@v4
      - run: brew install zellij ergochat/tap/ergo weechat
      - run: uv sync
      - run: uv run pytest tests/e2e/ -v -m e2e

